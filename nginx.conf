server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow CORS so m3u-editor / epg-channel-browser (on any domain) can fetch
    # the manifest and images
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;

    # Gzip text responses -- the manifest alone is ~1.5MB of JSON, which
    # compresses to a fraction of that. This was off entirely before, so
    # every client (including epg-channel-browser refreshing its logo index)
    # was pulling the full uncompressed file every time.
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 512;
    gzip_types application/json text/plain text/css application/javascript text/xml application/xml image/svg+xml;

    location / {
        try_files $uri $uri/ =404;
    }

    # Serve manifest with correct content-type. Short cache -- this file
    # changes whenever generate_manifest.py reruns (new logos added), so we
    # don't want clients or intermediate caches sitting on a stale copy for
    # long, but a minute of caching still absorbs bursts of refreshes.
    location = /logos-manifest.json {
        add_header Content-Type "application/json" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=60" always;
    }

    # Logo images change occasionally (rebrands / replacements land at the
    # same URL per the README), so cache meaningfully but not forever --
    # 1 day balances real bandwidth savings against updates actually
    # reaching viewers in a reasonable time.
    location ^~ /countries/ {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=86400" always;
        try_files $uri =404;
    }

    # Thumbnails change far less often than the manifest, and a 404 here
    # (not yet generated) is expected and non-fatal -- app.js falls back to
    # the full image automatically. Safe to cache a bit longer.
    location ^~ /thumbs/ {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=604800" always;
        try_files $uri =404;
    }

    location ^~ /misc/ {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=86400" always;
        try_files $uri =404;
    }
}
